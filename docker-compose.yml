# Local end-to-end stack for the GPU Telemetry pipeline.
#
# Usage:
#   docker compose up --build         # full stack
#   docker compose logs -f streamer   # tail one service
#   docker compose down -v            # tear down + drop volumes
#
# Topology:
#   postgres ────► collector ──► (writes)
#                     ▲
#                     │ subscribes
#   streamer ──► messagequeue
#                     ▲
#   gateway ────► postgres (reads)

name: gpu-telemetry

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gpu
      POSTGRES_PASSWORD: gpu
      POSTGRES_DB: gpu_telemetry
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpu -d gpu_telemetry"]
      interval: 5s
      timeout: 3s
      retries: 10

  messagequeue:
    build:
      context: .
      dockerfile: services/messagequeue/Dockerfile
    image: gpu-telemetry/messagequeue:dev
    restart: unless-stopped
    environment:
      GRPC_PORT: "9090"
      MQ_PARTITIONS: "10"
      MQ_RING_BUFFER_SIZE: "65536"
      MQ_WAL_DIR: "/var/lib/mq-wal"
      MQ_WAL_SYNC_BYTES: "4096"
    volumes:
      - mq-wal:/var/lib/mq-wal
    ports:
      - "9090:9090"

  streamer:
    build:
      context: .
      dockerfile: services/streamer/Dockerfile
    image: gpu-telemetry/streamer:dev
    restart: unless-stopped
    depends_on:
      messagequeue:
        condition: service_started
    environment:
      MQ_ADDRESS: "messagequeue:9090"
      MQ_TOPIC: "gpu-telemetry"
      STREAMER_INDEX: "0"
      STREAMER_TOTAL: "1"
      CSV_PATH: "/data/sample_data.csv"
      STREAM_INTERVAL_MS: "100"
    volumes:
      - ./data:/data:ro

  collector:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    image: gpu-telemetry/collector:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      messagequeue:
        condition: service_started
    environment:
      MQ_ADDRESS: "messagequeue:9090"
      MQ_TOPIC: "gpu-telemetry"
      CONSUMER_ID: "collector-0"
      CONSUMER_GROUP: "collector-group"
      DATABASE_URL: "postgres://gpu:gpu@postgres:5432/gpu_telemetry?sslmode=disable"

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: gpu-telemetry/gateway:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://gpu:gpu@postgres:5432/gpu_telemetry?sslmode=disable"
      API_DEFAULT_LIMIT: "100"
      API_MAX_LIMIT: "1000"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  mq-wal:
