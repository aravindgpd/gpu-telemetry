## GPU Telemetry Pipeline — Helm Values
## Override any value with: --set key=value or --values my-values.yaml
##
## Multi-cluster topologies: each top-level component (messagequeue, streamer,
## collector, gateway) has an `enabled` flag. Set the flag to false to skip
## that component's resources; supply an `externalAddress` (where applicable)
## to point the OTHER components at a copy living in a different cluster.
## See deploy/helm/gpu-telemetry/examples/ for ready-made values files.

global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Message Queue Broker ───────────────────────────────────────────────────────
messagequeue:
  enabled: true                        # set false to NOT install broker here
  # When this cluster does NOT run the broker, set externalAddress to point at
  # the cluster that does, e.g. "mq.cluster-a.example.com:9090". Wins over the
  # in-cluster service name in the mqAddress helper.
  externalAddress: ""
  replicaCount: 1
  image:
    repository: aravindgpd/gpu-telemetry-messagequeue
    tag: dev
    pullPolicy: Always
  service:
    # ClusterIP (headless): in-cluster only. Other clusters can't reach it.
    # NodePort: any node IP on the cluster + nodePort number.
    # LoadBalancer: cloud provider provisions an external IP/DNS name.
    type: ClusterIP
    # Only used when type=NodePort; leave 0 to let Kubernetes pick.
    nodePort: 0
    port: 9090
    metricsPort: 9091
  config:
    partitions: 10
    ringBufferSize: 65536   # must be power of 2
    walDir: /data/wal
    overflowPolicy: drop    # drop | block
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""        # "" = cluster default
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9091"

# ── Telemetry Streamer ─────────────────────────────────────────────────────────
streamer:
  enabled: true             # set false to NOT install streamer here
  replicaCount: 2           # 1–10; STREAMER_TOTAL is set automatically to this value
  image:
    repository: aravindgpd/gpu-telemetry-streamer
    tag: dev
    pullPolicy: Always
  config:
    mqTopic: gpu-telemetry
    streamIntervalMs: 100              # delay between streamed rows (ms)
    # CSV is baked into the streamer image at this path; override only if you
    # mount a different file via an extra volume/initContainer.
    csvPath: /data/sample_data.csv
  # Streamer autoscaling is OFF by default. The pod template's STREAMER_TOTAL
  # env var is rendered from .replicaCount at chart install time, so an HPA
  # adding new pods at runtime would give them a stale STREAMER_TOTAL and they
  # would crash (INDEX >= TOTAL). To scale streamers safely:
  #   helm upgrade --reuse-values --set streamer.replicaCount=N
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9091"

# ── Telemetry Collector ────────────────────────────────────────────────────────
collector:
  enabled: true             # set false to NOT install collector here
  replicaCount: 2
  image:
    repository: aravindgpd/gpu-telemetry-collector
    tag: dev
    pullPolicy: Always
  config:
    mqTopic: gpu-telemetry
    consumerGroup: collector-group
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9091"

# ── API Gateway ────────────────────────────────────────────────────────────────
gateway:
  enabled: true             # set false to NOT install gateway here
  replicaCount: 2
  image:
    repository: aravindgpd/gpu-telemetry-gateway
    tag: dev
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9091
  ingress:
    enabled: false          # set to true and configure host for external access
    className: nginx
    annotations: {}
    host: gpu-telemetry.local
    tls: []
  config:
    defaultLimit: 100
    maxLimit: 1000
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9091"

# ── PostgreSQL (Bitnami subchart) ──────────────────────────────────────────────
# NOTE: As of Aug 2025, Bitnami moved pinned/versioned free images out of
# docker.io/bitnami/* into docker.io/bitnamilegacy/*. The main bitnami namespace
# now only serves "latest" tags for paid subscribers. The image.* overrides
# below redirect to the legacy archive so the chart's pinned tags still pull.
# See docs/HELM_INSTALL_AND_SMOKE_TEST.md §7 for context.
postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: true   # required to use non-"bitnami" repos
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r14
  volumePermissions:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: 12-debian-12-r33
  metrics:
    image:
      registry: docker.io
      repository: bitnamilegacy/postgres-exporter
      tag: 0.15.0-debian-12-r14
  auth:
    database: gpu_telemetry
    username: gpu_user
    password: changeme        # override in production with a Secret
  primary:
    persistence:
      enabled: true
      size: 20Gi

# ── External PostgreSQL (when postgresql.enabled=false) ───────────────────────
externalDatabase:
  host: ""
  port: 5432
  database: gpu_telemetry
  username: gpu_user
  # Reference an existing Secret key instead of embedding plaintext credentials
  existingSecret: ""
  existingSecretPasswordKey: password
