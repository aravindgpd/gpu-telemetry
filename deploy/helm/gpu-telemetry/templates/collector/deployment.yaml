{{- $component := "collector" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-{{ $component }}
  labels:
    {{- include "gpu-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.collector.replicaCount }}
  selector:
    matchLabels:
      {{- include "gpu-telemetry.selectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-telemetry.selectorLabels" (merge (dict "component" $component) .) | nindent 8 }}
      annotations:
        {{- toYaml .Values.collector.podAnnotations | nindent 8 }}
    spec:
      containers:
        - name: {{ $component }}
          image: "{{ .Values.global.imageRegistry }}{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          env:
            - name: MQ_ADDRESS
              value: {{ include "gpu-telemetry.mqAddress" . | quote }}
            - name: MQ_TOPIC
              value: {{ .Values.collector.config.mqTopic | quote }}
            - name: CONSUMER_GROUP
              value: {{ .Values.collector.config.consumerGroup | quote }}
            - name: CONSUMER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name   # pod name is unique — used as consumer ID
            - name: DATABASE_URL
              value: {{ include "gpu-telemetry.databaseURL" . | quote }}
          # NOTE: no liveness/readiness probes wired yet — the Collector has no
          # HTTP health endpoint and runs on a distroless image with no shell.
          # Once a /healthz handler is added (planned for a follow-up), use:
          #   livenessProbe: { httpGet: { path: /healthz, port: <metrics-port> } }
          # Kubernetes still restarts the pod if the container process exits.
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
