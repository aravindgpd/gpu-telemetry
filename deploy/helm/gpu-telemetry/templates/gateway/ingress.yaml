{{- if and .Values.gateway.enabled .Values.gateway.ingress.enabled }}
{{- $component := "gateway" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-{{ $component }}
  labels:
    {{- include "gpu-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- with .Values.gateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.ingress.className }}
  ingressClassName: {{ .Values.gateway.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gpu-telemetry.fullname" . }}-{{ $component }}
                port:
                  name: http
  {{- with .Values.gateway.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
