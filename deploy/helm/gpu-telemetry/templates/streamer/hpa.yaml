{{- if and .Values.streamer.enabled .Values.streamer.autoscaling.enabled }}
{{- $component := "streamer" }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-{{ $component }}
  labels:
    {{- include "gpu-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "gpu-telemetry.fullname" . }}-{{ $component }}
  minReplicas: {{ .Values.streamer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.streamer.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.streamer.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
